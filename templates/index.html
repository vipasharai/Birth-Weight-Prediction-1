<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birth Weight Form</title>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2, #ff758c);
            background-size: 300% 300%;
            animation: gradientBG 8s ease infinite;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* Animated background */
        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .container {
            width: 360px;
            margin: 70px auto;
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            color: white;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 25px;
            color: #ffffff;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            margin-top: 10px;
            display: block;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 6px 0 15px 0;
            border: none;
            border-radius: 8px;
            outline: none;
            background: rgba(255,255,255,0.9);
            transition: 0.3s;
        }

        input:focus {
            transform: scale(1.03);
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(to right, #ff9966, #ff5e62);
            color: white;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: linear-gradient(to right, #ff5e62, #ff9966);
        }

        h3 {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Predict Birth Weight of Your Child</h1>

        <form action="/predict" method="POST">

            <label>Gestation</label>
            <input name="gestation" type="number">

            <label>Parity</label>
            <input name="parity" type="number">

            <label>Age</label>
            <input name="age" type="number">

            <label>Height</label>
            <input name="height" type="number">

            <label>Weight</label>
            <input name="weight" type="number">

            <label>Smoke</label>
            <input name="smoke" type="number">

            <button type="submit">Predict Birth Weight</button>

        </form>

        <h3>Predicted Birth Weight : {{prediction}}</h3>
    </div>

</body>
</html>
